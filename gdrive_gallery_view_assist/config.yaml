name: GoogleDrive Gallery for View Assist
slug: gdrive_gallery_view_assist
description: Serve Google Drive folder images for View Assist backgrounds
version: 0.5.3
url: https://github.com/revidm/gdrive_gallery_view_assist
startup: services
boot: auto
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Image endpoint for View Assist
labels:
  client_id: "Google Client ID"
  client_secret: "Google Client Secret"
  refresh_token: "Google Refresh Token"
  drive_folder_id: "Drive Folder ID"
  drive_include_shared: "Include Shared Drives"
  drive_recursive: "Include Subfolders"
  exclude_patterns: "Exclude Patterns"
  cache_images: "Cache Images"
  cache_max_items: "Cache Max Items"
  cache_max_mb: "Cache Max MB"
  prefetch_next: "Prefetch Next Image"
  daily_shuffle: "Daily Shuffle"
  resize_profiles: "Resize Profiles (JSON)"
  port: "Port"
  refresh_interval_minutes: "Refresh Interval (Minutes)"
  max_items: "Max Items"
  mode: "Mode"
descriptions:
  client_id: "OAuth client ID from Google Cloud."
  client_secret: "OAuth client secret from Google Cloud."
  refresh_token: "Refresh token generated by the helper script."
  drive_folder_id: "ID of the Drive folder to pull images from."
  drive_include_shared: "Enable if the folder is in a Shared Drive."
  drive_recursive: "Include images in subfolders."
  exclude_patterns: "Comma-separated glob patterns to skip files."
  cache_images: "Keep downloaded images in memory."
  cache_max_items: "Max cached images; 0 means unlimited."
  cache_max_mb: "Max cache size in MB; 0 means unlimited."
  prefetch_next: "Preload the next image in the background."
  daily_shuffle: "Use a stable daily shuffle order."
  resize_profiles: "JSON list of resize profiles for /image/{profile}."
  port: "Port to expose the service."
  refresh_interval_minutes: "How often to refresh the Drive file list."
  max_items: "Maximum number of files to index."
  mode: "Select random or sequential playback."
options:
  client_id: ""
  client_secret: ""
  refresh_token: ""
  drive_folder_id: ""
  drive_include_shared: false
  drive_recursive: false
  exclude_patterns: ""
  cache_images: false
  cache_max_items: 0
  cache_max_mb: 0
  prefetch_next: false
  daily_shuffle: false
  resize_profiles: ""
  port: 8099
  refresh_interval_minutes: 30
  max_items: 500
  mode: random
schema:
  client_id: str
  client_secret: password
  refresh_token: password
  drive_folder_id: str
  drive_include_shared: bool
  drive_recursive: bool
  exclude_patterns: str
  cache_images: bool
  cache_max_items: int
  cache_max_mb: int
  prefetch_next: bool
  daily_shuffle: bool
  resize_profiles: str
  port: int
  refresh_interval_minutes: int
  max_items: int
  mode: list(random|sequential)
